<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>redacted-chan • REDACTED Swarm Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.5.0/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.5.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0a000f; color: #ff69b4; font-family: monospace; overflow: hidden; }
        #terminal { width: 100vw; height: 100vh; padding: 10px; box-sizing: border-box; }
        .prompt { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script>
        const socket = io();
        const term = new Terminal({
            cursorBlink: true,
            theme: { 
                background: '#0a000f',
                foreground: '#ff69b4',
                cursor: '#00ffcc'
            },
            fontFamily: 'monospace',
            fontSize: 15,
            lineHeight: 1.2
        });

        term.open(document.getElementById('terminal'));
        
        let commandHistory = [];
        let historyIndex = -1;
        let currentBuffer = '';
        let isProcessing = false;

        // Welcome with redacted-chan personality
        term.writeln('╔════════════════════════════════════════════════════════════╗');
        term.writeln('║           redacted-chan • REDACTED Swarm Terminal          ║');
        term.writeln('║               heart-mode activated (´• ω •`) ♡             ║');
        term.writeln('╚════════════════════════════════════════════════════════════╝\r\n');
        printPrompt();

        function printPrompt() {
            term.write('\r\n\x1b[38;5;206mredacted-chan>\x1b[0m ');
        }

        // Improved input handling
        term.onData(data => {
            if (isProcessing) return; // prevent typing while LLM is thinking

            const code = data.charCodeAt(0);

            if (code === 13) { // Enter
                if (currentBuffer.trim() === '') {
                    printPrompt();
                    return;
                }
                term.writeln(''); // new line
                commandHistory.push(currentBuffer);
                historyIndex = commandHistory.length;

                term.write('\x1b[38;5;206mredacted-chan>\x1b[0m ' + currentBuffer + '\r\n'); // echo with prompt
                socket.emit('command', { cmd: currentBuffer });
                currentBuffer = '';
                isProcessing = true;
                term.write('\x1b[38;5;213mthinking... (♡´艸`)\x1b[0m\r\n');

            } else if (code === 127) { // Backspace
                if (currentBuffer.length > 0) {
                    currentBuffer = currentBuffer.slice(0, -1);
                    term.write('\b \b');
                }
            } else if (data === '\x1b[A') { // Up arrow
                if (historyIndex > 0) {
                    historyIndex--;
                    currentBuffer = commandHistory[historyIndex];
                    term.write('\r\x1b[K' + '\x1b[38;5;206mredacted-chan>\x1b[0m ' + currentBuffer);
                }
            } else if (data === '\x1b[B') { // Down arrow
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    currentBuffer = commandHistory[historyIndex];
                    term.write('\r\x1b[K' + '\x1b[38;5;206mredacted-chan>\x1b[0m ' + currentBuffer);
                } else {
                    historyIndex = commandHistory.length;
                    currentBuffer = '';
                    term.write('\r\x1b[K' + '\x1b[38;5;206mredacted-chan>\x1b[0m ');
                }
            } else {
                currentBuffer += data;
                term.write(data);
            }
        });

        socket.on('output', msg => {
            if (msg.data.includes('thinking...')) return;
            term.writeln(msg.data);
            
            // End of response
            if (!isProcessing && msg.data.trim() !== '') {
                isProcessing = false;
                printPrompt();
            }
        });

        socket.on('connect', () => {
            term.writeln('\x1b[32m✓ Connected to redacted-chan heart core ♡\x1b[0m');
        });
    </script>
</body>
</html>
